{% extends "base.html" %}
{% block title %}{% if eps %}Editar EPS{% else %}Nueva EPS{% endif %} – Admin{% endblock %}
{% block content %}
<div class="container-fluid px-4 py-4">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="page-header mb-4">
        <div class="page-icon bg-green-soft"><i class="bi bi-hospital-fill text-success"></i></div>
        <div>
          <h2 class="page-title">{% if eps %}Editar EPS{% else %}Nueva EPS{% endif %}</h2>
        </div>
      </div>
      <div class="form-card">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Nombre de la EPS <span class="text-danger">*</span></label>
            <input type="text" class="form-control" name="nombre"
                   value="{{ eps.nombre if eps else '' }}" required />
          </div>
          {% if eps %}
          <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select" name="activa">
              <option value="1" {% if eps.activa %}selected{% endif %}>Activa</option>
              <option value="0" {% if not eps.activa %}selected{% endif %}>Inactiva</option>
            </select>
          </div>
          {% endif %}
          <div class="d-flex gap-3 mt-3">
            <button type="submit" class="btn btn-primary-custom">
              <i class="bi bi-check-circle me-2"></i>Guardar
            </button>
            <a href="{{ url_for('admin.eps_lista') }}" class="btn btn-light">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
