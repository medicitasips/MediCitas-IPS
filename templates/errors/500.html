{% extends "base.html" %}
{% block title %}500 – Error del servidor{% endblock %}
{% block content %}
<div class="container text-center py-5">
  <div class="empty-state">
    <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
    <h2 class="mt-3">500 – Error interno del servidor</h2>
    <p class="text-muted">Ocurrió un error inesperado. Intente nuevamente.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary-custom mt-3">
      <i class="bi bi-house me-2"></i>Volver al inicio
    </a>
  </div>
</div>
{% endblock %}
